</head>
<body>

<header>
<h1>🧠 Flashcard Maker</h1>
<p>Paste notes and turn them into study flashcards.</p>
</header>

<div class="container">

<div class="card">
<h2>Paste Your Notes</h2>
<textarea id="notes" placeholder="Example: Photosynthesis is the process plants use to make food. The mitochondria produces energy for the cell." style="width:100%; height:180px; padding:15px; border-radius:12px; border:none; font-size:16px;"></textarea>
<br><br>
<button onclick="makeFlashcards()">Generate Flashcards</button>
</div>

<div class="card">
<h2>Generated Flashcards</h2>
<div id="flashcards">
<p>Your flashcards will show here.</p>
</div>
</div>

</div>

<script>
let flashcards = [];
let currentCard = 0;
let showingAnswer = false;

function makeFlashcards() {
  let notes = document.getElementById("notes").value;
  let sentences = notes.split(".");
  flashcards = [];
  currentCard = 0;
  showingAnswer = false;

  for (let i = 0; i < sentences.length; i++) {
    let sentence = sentences[i].trim();

    if (sentence.length > 15) {
      flashcards.push({
        question: makeQuestion(sentence),
        answer: sentence
      });
    }
  }

  if (flashcards.length === 0) {
    document.getElementById("flashcards").innerHTML = "<p>Please paste longer notes first.</p>";
    return;
  }

  showCard();
}

function makeQuestion(sentence) {
  let lower = sentence.toLowerCase();
  let words = sentence.split(" ");

  if (lower.includes("photosynthesis")) {
    return "What is photosynthesis?";
  }

  if (lower.includes("mitochondria")) {
    return "What does the mitochondria do?";
  }

  if (lower.includes(" produces ")) {
    let term = sentence.split(" produces ")[0];
    return "What does " + term.trim() + " produce?";
  }

  if (lower.includes(" helps ")) {
    let term = sentence.split(" helps ")[0];
    return "How does " + term.trim() + " help?";
  }

  if (lower.includes(" is the ")) {
    let term = sentence.split(" is the ")[0];
    return "What is " + term.trim() + "?";
  }

  if (lower.includes(" are the ")) {
    let term = sentence.split(" are the ")[0];
    return "What are " + term.trim() + "?";
  }

  if (words.length > 1) {
    return "What is " + words[0] + " " + words[1] + "?";
  }

  return "What should you remember from this?";
}
function showCard() {
  let card = flashcards[currentCard];

  document.getElementById("flashcards").innerHTML = `
    <div class="card" onclick="flipCard()" style="cursor:pointer; min-height:220px; display:flex; flex-direction:column; justify-content:center;">
      <p>Card ${currentCard + 1} of ${flashcards.length}</p>
      <h2>${showingAnswer ? "Answer" : "Question"}</h2>
      <p style="font-size:22px;">${showingAnswer ? card.answer : card.question}</p>
      <p style="font-size:14px; opacity:0.8;">Click card to flip</p>
    </div>

    <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
     <button onclick="previousCard()">Previous</button>
<button onclick="flipCard()">Flip</button>
<button onclick="nextCard()">Next</button>
<button onclick="shuffleCards()">Shuffle</button>
<button onclick="restartCards()">Restart</button>
    </div>
  `;
}

function flipCard() {
  showingAnswer = !showingAnswer;
  showCard();
}

function nextCard() {
  if (currentCard < flashcards.length - 1) {
    currentCard++;
    showingAnswer = false;
    showCard();
  }
}

function previousCard() {
  if (currentCard > 0) {
    currentCard--;
    showingAnswer = false;
    showCard();
  }
}
  function shuffleCards() {
    flashcards.sort(() => Math.random() - 0.5);
    currentCard = 0;
    showingAnswer = false;
    showCard();
}

function restartCards() {
    currentCard = 0;
    showingAnswer = false;
    showCard();
}
</script>

</body>
</html>
