<html lang="en">

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>🧠 Flashcards</h1>
<p>Create your own flashcards and study them one at a time.</p>
</header>

<div class="container">

<div class="card">
<h2>Create Flashcard</h2>

<input id="question" type="text" placeholder="Type your question..."
style="width:100%; padding:15px; margin-bottom:15px; border:none; border-radius:12px; font-size:16px;">

<textarea id="answer" placeholder="Type the answer..."
style="width:100%; height:140px; padding:15px; border:none; border-radius:12px; font-size:16px;"></textarea>

<br><br>

<button onclick="addFlashcard()">➕ Add Flashcard</button>
</div>

<div class="card">
<h2>Study Mode</h2>
<div id="studyArea">
<p>No flashcards yet. Add one to start studying.</p>
</div>
</div>

</div>

<script>
let flashcards = [];
let currentCard = 0;
let showingAnswer = false;

function addFlashcard() {
  let question = document.getElementById("question").value.trim();
  let answer = document.getElementById("answer").value.trim();

  if (question === "" || answer === "") {
    alert("Please type both a question and an answer.");
    return;
  }

  flashcards.push({ question: question, answer: answer });

  document.getElementById("question").value = "";
  document.getElementById("answer").value = "";

  currentCard = flashcards.length - 1;
  showingAnswer = false;
  showCard();
}

function showCard() {
  if (flashcards.length === 0) {
    document.getElementById("studyArea").innerHTML =
      "<p>No flashcards yet. Add one to start studying.</p>";
    return;
  }

  let card = flashcards[currentCard];

  document.getElementById("studyArea").innerHTML = `
    <div onclick="flipCard()" style="cursor:pointer; min-height:220px; display:flex; flex-direction:column; justify-content:center; text-align:center;">
      <p>Card ${currentCard + 1} of ${flashcards.length}</p>
      <h2>${showingAnswer ? "Answer" : "Question"}</h2>
      <p style="font-size:22px;">${showingAnswer ? card.answer : card.question}</p>
      <p style="font-size:14px; opacity:0.8;">Click to flip</p>
    </div>

    <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
      <button onclick="previousCard()">Previous</button>
      <button onclick="flipCard()">Flip</button>
      <button onclick="nextCard()">Next</button>
      <button onclick="shuffleCards()">Shuffle</button>
      <button onclick="restartCards()">Restart</button>
    </div>
  `;
}

function flipCard() {
  showingAnswer = !showingAnswer;
  showCard();
}

function nextCard() {
  if (currentCard < flashcards.length - 1) {
    currentCard++;
    showingAnswer = false;
    showCard();
  }
}

function previousCard() {
  if (currentCard > 0) {
    currentCard--;
    showingAnswer = false;
    showCard();
  }
}

function shuffleCards() {
  flashcards.sort(() => Math.random() - 0.5);
  currentCard = 0;
  showingAnswer = false;
  showCard();
}

function restartCards() {
  currentCard = 0;
  showingAnswer = false;
  showCard();
}
</script>

</body>
</html>
